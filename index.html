<title>B站影视灵感雷达 · 十一日汇总</title>
<style>
  :root{
    --bg:#0a0e17; --bg2:#0f1522; --panel:#131b2c; --panel2:#18223a;
    --line:#1f2b45; --line2:#2a3960;
    --txt:#e6ecf7; --txt2:#9fb0cc; --txt3:#65799b;
    --accent:#38e1c8; --accent2:#4a9eff; --hot:#ff5a4d; --warn:#ffb547;
    --gold:#ffd166; --purple:#a78bfa;
    --radius:14px; --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(74,158,255,.08), transparent 60%),
      radial-gradient(900px 500px at 0% 0%, rgba(56,225,200,.06), transparent 55%),
      var(--bg);
    color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    line-height:1.6; min-height:100vh; padding-bottom:80px;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1240px;margin:0 auto;padding:0 22px}

  /* ---------- header ---------- */
  header{padding:34px 0 22px;border-bottom:1px solid var(--line)}
  .hd-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .radar-ic{
    width:44px;height:44px;border-radius:12px;flex:none;
    background:linear-gradient(135deg,rgba(56,225,200,.2),rgba(74,158,255,.15));
    border:1px solid var(--line2);display:grid;place-items:center;position:relative;overflow:hidden;
  }
  .radar-ic::after{
    content:"";position:absolute;inset:6px;border-radius:50%;
    border:1px solid rgba(56,225,200,.5);
    background:conic-gradient(from 0deg,rgba(56,225,200,.55),transparent 55%);
    animation:sweep 3.4s linear infinite;
  }
  @keyframes sweep{to{transform:rotate(360deg)}}
  h1{font-size:24px;font-weight:700;letter-spacing:.5px}
  h1 .sub{color:var(--txt2);font-weight:400;font-size:14px;margin-left:6px}
  .hd-meta{color:var(--txt3);font-size:12.5px;margin-top:8px;font-family:var(--mono)}
  .note{color:var(--txt3);font-size:12px;margin-top:10px;padding:8px 12px;
    border-left:2px solid var(--line2);background:rgba(255,255,255,.02);border-radius:0 8px 8px 0}

  /* ---------- stat cards ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:20px 0 6px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .stat .n{font-size:26px;font-weight:700;font-family:var(--mono);color:var(--accent)}
  .stat .n.hot{color:var(--hot)} .stat .n.blue{color:var(--accent2)} .stat .n.gold{color:var(--gold)}
  .stat .l{font-size:12px;color:var(--txt2);margin-top:2px}

  /* scan timeline */
  .scans{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 4px}
  .scan-chip{flex:1;min-width:210px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:11px 14px}
  .scan-chip .d{font-family:var(--mono);font-size:13px;color:var(--accent2);font-weight:600}
  .scan-chip .w{font-size:11.5px;color:var(--txt3);margin-top:3px;font-family:var(--mono)}
  .scan-chip .s{font-size:11.5px;color:var(--txt2);margin-top:5px}

  /* ---------- controls ---------- */
  .controls{position:sticky;top:0;z-index:30;background:rgba(10,14,23,.86);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px 0;margin:22px 0 4px}
  .ctrl-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;background:var(--panel2);border:1px solid var(--line2);color:var(--txt);
    border-radius:10px;padding:10px 14px 10px 36px;font-size:14px;outline:none;transition:.2s}
  .search input:focus{border-color:var(--accent)}
  .search::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;font-size:13px}
  select{background:var(--panel2);border:1px solid var(--line2);color:var(--txt);border-radius:10px;
    padding:10px 12px;font-size:13px;outline:none;cursor:pointer}
  select:focus{border-color:var(--accent)}
  .toggle{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--txt2);cursor:pointer;user-select:none;
    background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:9px 13px}
  .toggle input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .fbtn{font-size:12.5px;padding:6px 13px;border-radius:20px;border:1px solid var(--line2);
    background:transparent;color:var(--txt2);cursor:pointer;transition:.18s;white-space:nowrap}
  .fbtn:hover{border-color:var(--accent2);color:var(--txt)}
  .fbtn.on{background:var(--accent2);border-color:var(--accent2);color:#04101f;font-weight:600}
  .flabel{font-size:11px;color:var(--txt3);align-self:center;margin-right:2px;letter-spacing:.5px}
  .count-line{font-size:12.5px;color:var(--txt3);margin-top:10px;font-family:var(--mono)}
  .count-line b{color:var(--accent)}

  /* ---------- work cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:16px;margin-top:16px}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:var(--radius);overflow:hidden;transition:.2s;display:flex;flex-direction:column}
  .card:hover{border-color:var(--line2);transform:translateY(-2px)}
  .card.conf-high{border-left:3px solid var(--accent)}
  .card.conf-medium{border-left:3px solid var(--accent2)}
  .card.conf-low{border-left:3px solid var(--txt3);opacity:.94}
  .card-hd{padding:15px 16px 12px;border-bottom:1px solid var(--line)}
  .card-title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card-name{font-size:16.5px;font-weight:700;line-height:1.35}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .bdg{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;white-space:nowrap}
  .bdg.type{background:rgba(74,158,255,.12);color:#8fc0ff;border:1px solid rgba(74,158,255,.2)}
  .bdg.theme{background:rgba(167,139,250,.12);color:#c4b3ff;border:1px solid rgba(167,139,250,.2)}
  .bdg.date{background:rgba(255,255,255,.05);color:var(--txt2);border:1px solid var(--line2);font-family:var(--mono)}
  .bdg.rel{background:rgba(240,180,90,.13);color:#f2c07a;border:1px solid rgba(240,180,90,.24);font-family:var(--mono)}
  .bdg.rel.na{background:rgba(255,255,255,.04);color:var(--txt2);border:1px solid var(--line2)}
  .conf-tag{font-size:10.5px;padding:3px 8px;border-radius:6px;font-weight:600;white-space:nowrap;flex:none}
  .conf-tag.high{background:rgba(56,225,200,.14);color:var(--accent)}
  .conf-tag.medium{background:rgba(74,158,255,.14);color:var(--accent2)}
  .conf-tag.low{background:rgba(101,121,155,.18);color:var(--txt2)}

  /* agg stats */
  .agg{display:flex;gap:14px;padding:11px 16px;background:rgba(255,255,255,.015);flex-wrap:wrap}
  .agg .m{display:flex;flex-direction:column}
  .agg .m .v{font-family:var(--mono);font-size:15px;font-weight:700}
  .agg .m .v.hot{color:var(--hot)} .agg .m .v.gold{color:var(--gold)} .agg .m .v.acc{color:var(--accent)}
  .agg .m .k{font-size:10.5px;color:var(--txt3)}

  .card-body{padding:13px 16px;flex:1}
  .signal{font-size:13px;color:var(--txt2);margin-bottom:11px}
  .sec-t{font-size:11px;color:var(--txt3);letter-spacing:.8px;margin:12px 0 6px;font-weight:600}
  .discuss{font-size:12.5px;color:var(--txt2)}
  .inspire{list-style:none;margin-top:4px}
  .inspire li{font-size:12px;color:var(--txt2);padding:4px 0 4px 14px;position:relative;line-height:1.5}
  .inspire li::before{content:"";position:absolute;left:0;top:11px;width:5px;height:5px;border-radius:50%;background:var(--accent2)}
  .inspire li b{color:var(--txt);font-weight:600}
  .action-box{margin-top:12px;font-size:12px;color:var(--warn);background:rgba(255,181,71,.06);
    border:1px solid rgba(255,181,71,.14);border-radius:8px;padding:8px 11px}
  .action-box::before{content:"下一步 · ";color:var(--txt3);font-weight:600}

  /* videos */
  .vids{border-top:1px solid var(--line)}
  .vids-hd{padding:9px 16px;font-size:11.5px;color:var(--txt3);cursor:pointer;display:flex;
    justify-content:space-between;align-items:center;user-select:none}
  .vids-hd:hover{color:var(--txt2)}
  .vids-hd .arrow{transition:.2s}
  .vids.collapsed .vids-hd .arrow{transform:rotate(-90deg)}
  .vids.collapsed .vid{display:none}
  .vid{padding:10px 16px;border-top:1px solid var(--line);display:block;transition:.15s}
  .vid:hover{background:rgba(74,158,255,.05)}
  .vid-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .vid-title{font-size:12.5px;color:var(--txt);line-height:1.4}
  .vid-title:hover{color:var(--accent2)}
  .vid-bv{font-family:var(--mono);font-size:10.5px;color:var(--txt3);flex:none}
  .vid-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:11px;color:var(--txt3);font-family:var(--mono)}

  .vid-meta .st{display:inline-flex;gap:3px;align-items:center}
  .vid-meta .st.play{color:var(--hot)}
  .vid-meta .st.like{color:var(--accent)}

  .empty{text-align:center;padding:60px 20px;color:var(--txt3)}
  footer{text-align:center;color:var(--txt3);font-size:11.5px;margin-top:40px;padding-top:20px;border-top:1px solid var(--line)}
  footer a{color:var(--accent2)}

  @media(max-width:640px){
    .grid{grid-template-columns:1fr}
    h1{font-size:20px}
    .stats{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>

  let view=0,like=0,fav=0,coin=0,eng=0;
  w.videos.forEach(v=>{view+=v.view||0;like+=v.like||0;fav+=v.fav||0;coin+=v.coin||0;eng+=engage(v);});
  return {view,like,fav,coin,eng,rate:view?eng/view:0};
};

  : [...new Set(DATA.works.map(w=>w.themeGroup).filter(Boolean))];

/* ==== release 年份 → 年代分档 ==== */
function releaseYear(w){
  if(!w.release) return null;
  const y=parseInt(String(w.release).slice(0,4),10);
  return isNaN(y)?null:y;
}
function eraOf(w){
  const y=releaseYear(w);
  if(y===null) return 'unknown';
  if(y>=2020) return '2020s';
  if(y>=2010) return '2010s';
  if(y>=2000) return '2000s';
  if(y>=1990) return '1990s';
  return 'pre1990';
}

function buildFilter(el,label,items,key){
  const box=document.getElementById(el);
  let html=`<span class="flabel">${label}</span><button class="fbtn on" data-v="all">全部</button>`;
  items.forEach(it=>{ html+=`<button class="fbtn" data-v="${it.v}">${it.t}</button>`; });
  box.innerHTML=html;
  box.querySelectorAll('.fbtn').forEach(b=>b.onclick=()=>{
    box.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); state[key]=b.dataset.v; render();
  });
}

  const key={view:w=>w._agg.view,engage:w=>w._agg.eng,like:w=>w._agg.like,
    fav:w=>w._agg.fav,coin:w=>w._agg.coin,rate:w=>w._agg.rate};
  if(s==='name') return arr.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  if(s==='date') return arr.sort((a,b)=>b.scanDate.localeCompare(a.scanDate)|| b._agg.view-a._agg.view);
  if(s==='release_desc'||s==='release_asc'){
    return arr.sort((a,b)=>{
      const ya=releaseYear(a), yb=releaseYear(b);
      if(ya===null&&yb===null) return b._agg.view-a._agg.view; /* 都未知按播放 */
      if(ya===null) return 1;  /* 未知永远排末尾 */
      if(yb===null) return -1;
      return s==='release_desc' ? (yb-ya) : (ya-yb);
    });
  }
  return arr.sort((a,b)=>key[s](b)-key[s](a));
}
function vidHTML(v){
  return `<a class="vid" href="https://www.bilibili.com/video/${v.bv}" target="_blank" rel="noopener">
    <div class="vid-top">
      <span class="vid-title">${v.title}</span>
      <span class="vid-bv">${v.bv}</span>
    </div>
    <div class="vid-meta">
      <span class="up">@${v.up}</span>
      <span>${v.pub}</span>
      <span class="st play">▶ ${fmt(v.view)}</span>
      <span class="st like">♥ ${fmt(v.like)}</span>
      <span class="st">⭐ ${fmt(v.fav)}</span>
      <span class="st">🪙 ${fmt(v.coin)}</span>
      <span class="st">💬 ${fmt(v.reply)}</span>
      <span class="st">🅑 ${fmt(v.danmaku)}</span>
    </div></a>`;
}
function cardHTML(w){
  const a=w._agg;
  const vids=[...w.videos].sort((x,y)=>(y.view||0)-(x.view||0));
  const collapsed = vids.length>2 ? '' : '';
  return `<div class="card conf-${w.confidence}">
    <div class="card-hd">
      <div class="card-title-row">
        <div class="card-name">${w.name}</div>
        <span class="conf-tag ${w.confidence}">${CONF_LABEL[w.confidence]}</span>
      </div>
      <div class="badges">
        <span class="bdg type">${w.type}</span>
        ${w.release?`<span class="bdg rel">🎬 ${w.release}</span>`:`<span class="bdg rel na">上映 —</span>`}
        <span class="bdg theme">${w.theme}</span>
        <span class="bdg date">◉ ${w.scanDate}</span>
      </div>
    </div>
    <div class="agg">
      <div class="m"><span class="v hot">${fmt(a.view)}</span><span class="k">播放</span></div>
      <div class="m"><span class="v acc">${fmt(a.eng)}</span><span class="k">互动</span></div>
      <div class="m"><span class="v gold">${fmt(a.like)}</span><span class="k">点赞</span></div>
      <div class="m"><span class="v">${fmt(a.fav)}</span><span class="k">收藏</span></div>
      <div class="m"><span class="v">${(a.rate*100).toFixed(1)}%</span><span class="k">互动率</span></div>
    </div>
    <div class="card-body">
      <div class="signal">${w.signal}</div>
      <div class="sec-t">讨论点</div>
      <div class="discuss">${w.discuss}</div>
      <div class="sec-t">可迁移灵感方向</div>
      <ul class="inspire">${w.inspire.map(x=>{
        const i=x.indexOf('：'); return i>0?`<li><b>${x.slice(0,i)}</b>${x.slice(i)}</li>`:`<li>${x}</li>`;
      }).join('')}</ul>
      <div class="action-box">${w.action}</div>
    </div>
    <div class="vids ${collapsed}">
      <div class="vids-hd" onclick="this.parentNode.classList.toggle('collapsed')">
        <span>相关视频 · ${vids.length} 条</span><span class="arrow">▼</span>
      </div>
      ${vids.map(vidHTML).join('')}
    </div>
  </div>`;
}
function render(){
  let arr=DATA.works.filter(w=>{
    if(!state.showLow && w.confidence==='low') return false;
    if(state.date!=='all' && w.scanDate!==state.date) return false;
    if(state.theme!=='all' && w.themeGroup!==state.theme) return false;
    if(state.era!=='all' && eraOf(w)!==state.era) return false;
    if(state.conf!=='all' && w.confidence!==state.conf) return false;
    return matchQ(w);
  });
  arr=sortWorks(arr);
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  grid.innerHTML=arr.map(cardHTML).join('');
  empty.style.display=arr.length?'none':'block';
  const shownViews=arr.reduce((a,w)=>a+w._agg.view,0);
  document.getElementById('countLine').innerHTML=
    `显示 <b>${arr.length}</b> / ${DATA.works.length} 个作品 · 累计播放 <b>${fmt(shownViews)}</b>`;
}
render();
</script>
</body>
</html>
